<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Currency Converter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    overflow:auto;
}

.card{
    width:350px;
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(20px);
    background:rgba(255,255,255,0.1);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    color:white;
    animation:float 4s ease-in-out infinite;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    font-size:13px;
    opacity:0.8;
}

input, select{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    margin-top:5px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-size:15px;
    cursor:pointer;
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.swap-btn{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.result{
    margin-top:15px;
    font-weight:600;
    text-align:center;
    font-size:18px;
}

/* Chart container */
.chart-container{
    margin-top:20px;
}

canvas{
    background:white;
    border-radius:15px;
    padding:10px;
}

@media(max-width:420px){
    .card{
        width:95%;
    }
}

:root{
    --bg-gradient: linear-gradient(135deg,#1e3c72,#2a5298);
    --card-bg: rgba(255,255,255,0.1);
    --text-color: white;
}

body{
    background: var(--bg-gradient);
    transition:0.4s;
}

.card{
    background: var(--card-bg);
    color: var(--text-color);
    transition:0.4s;
}

.theme-toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
    font-size:20px;
}

/* Light Theme */
body.light{
    --bg-gradient: linear-gradient(135deg,#f5f7fa,#c3cfe2);
    --card-bg: rgba(255,255,255,0.9);
    --text-color: #222;
}
</style>
</head>

<body>

<div class="card">
    <h2>Simple Currency Converter</h2>

    <div class="input-group">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount">
    </div>

    <div class="input-group">
        <label>From</label>
        <select id="fromCurrency">
            <option value="USD">🇺🇸 USD</option>
            <option value="INR">🇮🇳 INR</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="JPY">🇯🇵 JPY</option>
        </select>
    </div>

    <div class="input-group">
        <label>To</label>
        <select id="toCurrency">
            <option value="INR">🇮🇳 INR</option>
            <option value="USD">🇺🇸 USD</option>
            <option value="EUR">🇪🇺 EUR</option>
            <option value="GBP">🇬🇧 GBP</option>
            <option value="JPY">🇯🇵 JPY</option>
        </select>
    </div>

    <div class="theme-toggle" onclick="toggleTheme()">
    🌙
</div>

    <button onclick="convert()">Convert</button>
    <button class="swap-btn" onclick="swapCurrency()">🔄 Swap</button>

    <div class="result" id="result"></div>

    <div class="chart-container">
        <canvas id="rateChart"></canvas>
    </div>
</div>

<script>
const rates = {
    USD:1,
    INR:83,
    EUR:0.92,
    GBP:0.79,
    JPY:150
};

function convert(){
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("fromCurrency").value;
    let to = document.getElementById("toCurrency").value;

    if(amount===""){
        alert("Enter amount");
        return;
    }

    let result = (amount / rates[from]) * rates[to];
    document.getElementById("result").innerHTML =
        `${amount} ${from} = ${result.toFixed(2)} ${to}`;

    updateChart(from,to);
}

function swapCurrency(){
    let from = document.getElementById("fromCurrency");
    let to = document.getElementById("toCurrency");

    let temp = from.value;
    from.value = to.value;
    to.value = temp;

    convert();
}

/* Chart Setup */
let ctx = document.getElementById("rateChart").getContext("2d");
let rateChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
        datasets: [{
            label: "Exchange Rate Trend",
            data: [1,1.02,1.01,1.03,1.04,1.02,1.05],
            borderColor:"#ff5e62",
            backgroundColor:"rgba(255,94,98,0.2)",
            tension:0.4,
            fill:true
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{display:false}
        }
    }
});

function updateChart(from,to){
    let baseRate = rates[to] / rates[from];
    let randomData = [];

    for(let i=0;i<7;i++){
        randomData.push((baseRate + (Math.random()-0.5)*0.05).toFixed(2));
    }

    rateChart.data.datasets[0].data = randomData;
    rateChart.update();
}

function toggleTheme(){
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
